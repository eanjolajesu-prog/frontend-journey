<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Financial Track Dashboard</title>
</head>
<body>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">

            <h2>FinTrack</h2>

            <nav>

                <a href="#">🏠 Dashboard</a>

                <a href="#">💳 Cards</a>

                <a href="#">📊 Analytics</a>

                <a href="#">💸 Transactions</a>

                <a href="#">⚙ Settings</a>

                <a href="#">🚪 Logout</a>

            </nav>

        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Navbar -->
            <header class="navbar">

                <input
                    type="text"
                    placeholder="Search...">

                <div class="profile">

                    🔔

                    <img src="images/download.jpg" alt="profile">

                </div>

            </header>

            <!-- Balance Card -->
            <section class="balance-card">

                <h3>Current Balance</h3>

                <h1>#12,450.00</h1>

            </section>

            <!-- Stats -->
            <section class="stats">

                <div class="card">
                    <h4>Income</h4>
                    <p>#5,000</p>
                </div>

                <div class="card">
                    <h4>Expenses</h4>
                    <p>#1,500</p>
                </div>

                <div class="card">
                    <h4>Savings</h4>
                    <p>#10,000</p>
                </div>

            </section>

            <!-- Transactions -->
            <section class="transactions">

                <h2>Recent Transactions</h2>

                <table>

                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Amount</th>
                    </tr>

                    <tr>
                        <td>Groceries</td>
                        <td>Debit</td>
                        <td>-#15,000</td>
                    </tr>

                    <tr>
                        <td>Salary</td>
                        <td>Credit</td>
                        <td>+#20,000</td>
                    </tr>

                    <tr>
                        <td>Transportation</td>
                        <td>Debit</td>
                        <td>-#4,500</td>
                    </tr>

                </table>

            </section>

        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
</body>
</html>
